<!DOCTYPE html>
<html lang="zh" id="htmlRoot">
<head>
<meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://web.ifzq.gtimg.cn https://*.gtimg.cn;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K线会唱歌 · kbars sing</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app">
        <!-- ====== 顶部栏 ====== -->
        <header class="topbar">
            <div class="topbar-brand">
                <div class="brand-logo-wrap">
                    <img src="assets/img/biao.png" alt="logo" class="brand-logo">
                    <span class="brand-name">kbarok</span>
                </div>
                <div class="welcome-line" id="welcomeLine">
                    <span class="welcome-en line-main" id="welcomeEn">K-Line Sings</span>
                    <span class="welcome-zh line-main" id="welcomeZh"></span>
                </div>
            </div>
            <button class="lang-btn" id="langToggle">
                <span class="lang-label" id="langLabelZh">中</span>
                <span class="lang-slash">/</span>
                <span class="lang-label-en" id="langLabelEn">EN</span>
            </button>
        </header>

        <!-- ====== 视频/K线区域 ====== -->
        <main class="video-area">
            <video id="mainVideo" class="main-video" loop playsinline muted preload="auto"
                   src="assets/video/video1_h264.mp4"></video>
            <canvas id="klineCanvas" class="kline-canvas"></canvas>
            <div class="video-placeholder" id="videoPlaceholder">
                <span>加载中…</span>
            </div>
        </main>

        <!-- ====== 信息条（覆盖在视频上方） ====== -->
        <div class="info-bar" id="infoBar" style="display:none;">
            <div class="info-row">
                <span class="stock-code" id="stockCode">--</span>
                <span class="divider">|</span>
                <span class="stock-price" id="stockPrice">--</span>
                <span class="stock-change up" id="stockChange">--</span>
                <span class="stock-amount" id="stockAmount"></span>
                <span class="divider">|</span>
                <span id="stockRange"></span>
                <span class="divider">|</span>
                <span class="music-item" id="musicInstrument"></span>
                <span class="music-item" id="musicRhythm"></span>
                <span class="music-item" id="musicSynth"></span>
                <span class="music-item" id="musicSpeed"></span>
                <span class="record-info" id="recordInfo" style="display:none;">
                    <span class="record-dot">●</span>
                    <span class="record-label">REC</span>
                    <span class="record-time" id="recordTime">00:00</span>
                </span>
            </div>
        </div>

        <!-- ====== 探索面板（可收起） ====== -->
        <div class="explore-wrapper" id="exploreWrapper">
            <div class="explore-panel" id="explorePanel">
                <div class="explore-row">
                    <span class="explore-label" id="labelInstrument">音色</span>
                    <select class="explore-select" id="instrumentSelect">
                        <option>古筝</option>
                    </select>
                    <span class="explore-label" id="labelRhythm">节奏</span>
                    <select class="explore-select" id="rhythmSelect">
                        <option>Amapiano</option>
                    </select>
                    <span class="explore-label" id="labelSpeed">加速度</span>
                    <select class="explore-select" id="speedSelect">
                        <option value="1">1x</option>
                        <option value="2" selected>2x</option>
                        <option value="3">3x</option>
                    </select>
                </div>
                <div class="explore-row explore-row-2">
                    <input type="text" class="code-input" id="codeInput" placeholder="股票代码 如 300025" value="300025">
                    <span style="color:var(--text-2);">~</span>
                    <input type="date" class="explore-date" id="startDateInput">
                    <input type="date" class="explore-date" id="endDateInput">
                    <button class="explore-gen-btn" id="btnGen">音画生成</button>
                </div>
            </div>
        </div>

        <!-- ====== 控制栏 ====== -->
        <footer class="controlbar">
            <button class="ctrl-btn" id="btnFullscreen" title="全屏">全屏</button>
            <button class="ctrl-btn" id="btnStop" title="播放/停止">停止</button>
            <button class="ctrl-btn ctrl-btn-listen" id="btnListen" title="试听/静音">试听</button>
            <button class="ctrl-btn" id="btnExplore" title="探索/收起">探索</button>
            <button class="ctrl-btn" id="btnDownload" title="下载/分享">下载</button>
        </footer>

        <!-- ====== 底部提示 ====== -->
        <div class="footer-tip" id="footerTip">致敬禅师，探索无尽的数字音乐世界</div>
    </div>

    <!-- ====== 创作弹窗 ====== -->
    <div class="modal-overlay" id="developingModal">
        <div class="modal-card">
            <img class="modal-creating-img" id="modalImgZh" src="assets/img/zhchuangzuo.png" alt="创作中">
            <img class="modal-creating-img" id="modalImgEn" src="assets/img/enchuangzuo.png" alt="Creating" style="display:none;">
            <div class="modal-content">
                <div class="modal-title" id="devTitle">功能开发中</div>
                <div class="modal-desc" id="devDesc">该功能正在开发，敬请期待……</div>
                <button class="modal-close" id="devCloseBtn">关闭</button>
            </div>
        </div>
    </div>

    <!-- ====== 开发弹窗 ====== -->
    <div class="modal-overlay" id="developModal">
        <div class="modal-card">
            <img class="modal-creating-img" id="modalDevImgZh" src="assets/img/zhchuangzuo_develop.png" alt="开发中">
            <img class="modal-creating-img" id="modalDevImgEn" src="assets/img/enchuangzuo_develop.png" alt="Developing" style="display:none;">
            <div class="modal-content">
                <div class="modal-title" id="devTitle2">K线会唱歌</div>
                <div class="modal-desc" id="devDesc2">让指标与数据共振，探索量化策略的边界</div>
                <button class="modal-close" id="devCloseBtn2">关闭</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>
    <div id="loadingOverlay"><div class="spinner"></div></div>

    <!-- ====== 脚本加载顺序（依赖关系） ====== -->
    <script src="assets/js/core.js"></script>
    <script src="assets/js/events.js"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/music-generator.js"></script>
    <script src="assets/js/kline.js"></script>
    <script src="assets/js/recorder.js"></script>
    <script src="assets/js/player.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
